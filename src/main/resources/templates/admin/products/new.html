<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>商品登録</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            margin: 0;
            background: #f5f6f8;
        }

        .wrapper {
            display: flex;
            min-height: calc(100vh - 56px);
        }

        .sidebar {
            width: 220px;
            background: #f8f9fa;
            padding: 20px;
            border-right: 1px solid #ddd;
        }

        .main-content {
            flex: 1;
            padding: 20px;
        }
        .form-card {
            max-width: 720px;
            border-radius: 14px;
            border: none;
        }

        .btn {
            border-radius: 10px;
        }


    </style>

</head>

<body>

<!-- header -->
<div th:replace="admin/fragments/header :: header"></div>

<div class="wrapper">

    <!-- sidebar -->
    <div th:replace="admin/fragments/sidebar :: sidebar"></div>

    <!-- content -->
    <div class="main-content">

        <h2 class="mb-4 border-bottom pb-2">
            商品登録
        </h2>

        <div class="card form-card shadow-sm">

            <div class="card-body p-4">

        <form th:action="@{/admin/products/new}"
              method="post"
              enctype="multipart/form-data">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <!-- 商品名 -->
            <div class="mb-3">

                <label class="form-label">
                    商品名
                </label>

                <input type="text"
                       name="name"
                       class="form-control"
                       required>

            </div>

            <!-- 価格 -->
            <div class="mb-3">

                <label class="form-label">
                    価格
                </label>

                <input type="number"
                       name="price"
                       class="form-control"
                       required>

            </div>

            <!-- 在庫 -->
            <div class="mb-3">

                <label class="form-label">
                    在庫
                </label>

                <input type="number"
                       name="stock"
                       class="form-control"
                       required>

            </div>

            <!-- カテゴリ -->
            <div class="mb-3">

                <label class="form-label">
                    カテゴリ
                </label>

                <select name="category"
                        class="form-select"
                        required>

                    <option value="">
                        選択してください
                    </option>

                    <option th:each="c : ${categories}"
                            th:value="${c.name}"
                            th:text="${c.name}">
                    </option>

                </select>

            </div>

            <div class="mb-3">
                <label class="form-label">
                    説明文
                </label>

                <textarea name="description"
                          class="form-control"
                          rows="4">
               </textarea>
            </div>

            <!-- 商品画像 -->
            <div class="mb-3">

                <label class="form-label">
                    商品画像
                </label>

                <input type="file"
                       name="image"
                       class="form-control"
                       accept="image/*"
                       onchange="previewImage(event)">

            </div>

            <!-- preview -->
            <img id="preview"
                 class="img-fluid mb-3 rounded"
                 style="max-height: 200px;">

            <button class="btn btn-primary">
                登録
            </button>

            <a href="/admin/products"
               class="btn btn-secondary">
                一覧へ戻る
            </a>


        </form>
            </div>
        </div>

    </div>

</div>

<script>

    function previewImage(event) {

        const reader = new FileReader();

        reader.onload = function() {

            document.getElementById('preview').src =
                reader.result;

        };

        reader.readAsDataURL(event.target.files[0]);

    }

</script>

</body>
</html>
