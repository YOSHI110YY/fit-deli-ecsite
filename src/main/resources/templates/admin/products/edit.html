<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <title>商品編集</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #f5f6f8;
        }

        .wrapper {
            display: flex;
            min-height: calc(100vh - 56px);
        }

        .sidebar {
            width: 220px;
            background: #f8f9fa;
            padding: 20px;
            border-right: 1px solid #ddd;
        }

        .main-content {
            flex: 1;
            padding: 24px;
        }

        .form-card {
            max-width: 720px;
            border-radius: 14px;
            border: none;
        }

        .btn {
            border-radius: 10px;
        }

        .current-image {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            background: #f3f4f6;
        }
    </style>
</head>

<body>

<div th:replace="admin/fragments/header :: header"></div>

<div class="wrapper">

    <div th:replace="admin/fragments/sidebar :: sidebar"></div>

    <div class="main-content">

        <h2 class="mb-4 border-bottom pb-2">
            商品編集
        </h2>

        <div class="card form-card shadow-sm">

            <div class="card-body p-4">

                <form th:action="@{'/admin/products/edit/' + ${product.id}}"
                      method="post"
                      enctype="multipart/form-data">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <div class="mb-3">

                        <label class="form-label">
                            商品名
                        </label>

                        <input type="text"
                               name="name"
                               class="form-control"
                               th:value="${product.name}"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            価格
                        </label>

                        <input type="number"
                               name="price"
                               class="form-control"
                               th:value="${product.price}"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            在庫
                        </label>

                        <input type="number"
                               name="stock"
                               class="form-control"
                               th:value="${product.stock}"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            カテゴリ
                        </label>

                        <select name="category"
                                class="form-select"
                                required>

                            <option th:each="c : ${categories}"
                                    th:value="${c.name}"
                                    th:text="${c.name}"
                                    th:selected="${product.category == c.name}">
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            説明文
                        </label>

                        <textarea name="description"
                                  class="form-control"
                                  rows="4"
                                  th:text="${product.description}">
                        </textarea>
                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            現在の画像
                        </label>

                        <div>
                            <img th:if="${product.image != null}"
                                 th:src="@{'/uploads/product/' + ${product.image}}"
                                 class="current-image">

                            <img th:unless="${product.image != null}"
                                 src="/images/noimage.png"
                                 class="current-image">
                        </div>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            商品画像を変更
                        </label>

                        <input type="file"
                               name="image"
                               class="form-control"
                               accept="image/*">

                    </div>

                    <div class="d-flex gap-2">

                        <button class="btn btn-primary">
                            更新
                        </button>

                        <a href="/admin/products"
                           class="btn btn-secondary">
                            一覧へ戻る
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
