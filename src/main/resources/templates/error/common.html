<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>エラー</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background: #f5f6f8;
        }

        .error-card {
            max-width: 600px;
            margin: 100px auto;
            border-radius: 16px;
            border: none;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card shadow-sm error-card">

        <div class="card-body p-5 text-center">

            <h1 class="mb-3 text-danger">
                Error
            </h1>

            <p class="text-muted mb-4"
               th:text="${errorMessage}">
                エラーが発生しました
            </p>

            <a href="/"
               class="btn btn-dark">
                TOPへ戻る
            </a>

        </div>

    </div>

</div>

</body>
</html>
